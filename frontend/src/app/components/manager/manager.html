<div class="panel">
  <div class="panel-header manager-header">
    <div class="panel-badge">Manager</div>
    <h1 class="panel-title">Manager Panel</h1>
    <p class="panel-sub">Team-level access — view reports and manage your department.</p>
  </div>

  @if (loading()) {
    <div class="loading">Loading...</div>
  } @else if (error()) {
    <div class="alert-error">{{ error() }}</div>
  } @else {
    <div class="server-msg manager-msg">
      <span class="msg-icon">📋</span>
      <span>{{ message() }}</span>
    </div>

    <div class="info-grid">
      <div class="info-card">
        <div class="info-label">Access Level</div>
        <div class="info-value">Manager + Admin</div>
      </div>
      <div class="info-card">
        <div class="info-label">Permissions</div>
        <div class="info-value">Team Data</div>
      </div>
      <div class="info-card">
        <div class="info-label">Protected Route</div>
        <div class="info-value">/api/users/manager</div>
      </div>
    </div>
  }
</div>
